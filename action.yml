name: surfaceseal
description: >-
  Security merge gate for AI coding-agent control surfaces. Fails the build when a
  pull request introduces a poisoned hook, autorun task, MCP command, or hidden
  instruction into the agent control surface.
branding:
  icon: shield
  color: red

inputs:
  base:
    description: Base ref to diff against (defaults to the PR base, else HEAD~1).
    required: false
    default: ""
  format:
    description: Output format (pretty or sarif).
    required: false
    default: pretty
  fail-on-warning:
    description: Fail the job on warnings too (exit 1), not just critical (exit 2).
    required: false
    default: "false"
  exclude:
    description: Glob to skip (e.g. tests/fixtures/**); space-separated for multiple.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install surfaceseal
      shell: bash
      run: python -m pip install "surfaceseal @ git+https://github.com/leagames0221-sys/surfaceseal"
    - name: Scan control-surface diff
      shell: bash
      # Inputs are passed via env (never interpolated into the script body) so a
      # crafted input value cannot break out and execute — on-brand for a security tool.
      env:
        IN_BASE: ${{ inputs.base }}
        IN_PR_BASE: ${{ github.event.pull_request.base.sha }}
        IN_FORMAT: ${{ inputs.format }}
        IN_EXCLUDE: ${{ inputs.exclude }}
        IN_FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
      run: |
        BASE="$IN_BASE"
        if [ -z "$BASE" ]; then
          BASE="${IN_PR_BASE:-HEAD~1}"
        fi
        EXCLUDE_ARGS=()
        for g in $IN_EXCLUDE; do EXCLUDE_ARGS+=(--exclude "$g"); done
        set +e
        surfaceseal scan --diff --base "$BASE" --format "$IN_FORMAT" "${EXCLUDE_ARGS[@]}"
        code=$?
        set -e
        # exit 2 = critical always fails; exit 1 = warning fails only if requested
        if [ "$code" -eq 2 ]; then exit 1; fi
        if [ "$code" -eq 1 ] && [ "$IN_FAIL_ON_WARNING" = "true" ]; then exit 1; fi
        exit 0
