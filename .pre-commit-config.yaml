# Local guardrails before a commit lands. Install with: pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Dogfood: surfaceseal gates its own agent control-surface changes.
  - repo: local
    hooks:
      - id: surfaceseal
        name: surfaceseal (agent control-surface gate)
        entry: surfaceseal scan --diff --base HEAD --exclude tests/fixtures/**
        language: system
        pass_filenames: false
        always_run: true
